<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Gia Sư Tin học THPT</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Highlight -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
}

#chatBox{
height:70vh;
overflow:auto;
}

.message{
padding:12px;
border-radius:10px;
margin:10px 0;
max-width:700px;
}

.user{
background:#4338ca;
margin-left:auto;
}

.ai{
background:#1e293b;
}

textarea{
resize:none;
}

</style>

</head>

<body class="p-6">

<h1 class="text-2xl font-bold mb-4">AI Gia Sư Tin học THPT</h1>

<div id="chatBox"></div>

<div class="flex gap-2 mt-4">

<textarea
id="userInput"
rows="1"
class="flex-1 border p-2 rounded text-black"
placeholder="Nhập câu hỏi..."
></textarea>

<button
id="sendBtn"
class="bg-indigo-600 px-4 py-2 rounded"
onclick="sendMessage()"
>
Gửi
</button>

</div>

<script src="script.js" defer></script>

</body>
</html>
